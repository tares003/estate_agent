# pnpm workspace — the single-stack TypeScript monorepo.
#
# One Next.js (App Router) app with Payload CMS mounted inside it (apps/web),
# a BullMQ worker process sharing the same codebase (apps/workers), and the
# shared packages/* libraries. Turborepo (turbo.json) orchestrates the task
# graph on top of these workspaces — see docs/adr/0002-monorepo-tool.md.
packages:
  - 'apps/*'
  - 'packages/*'
